<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Reyn Gwyneth’s Make Up Store</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
        }
        .form-section {
            background: var(--soft-white);
            border: 1px solid var(--lace-border);
            border-radius: 12px;
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--lace-border);
            border-radius: 8px;
            font-family: 'Georgia', serif;
            background-color: var(--cream);
            color: var(--dark-berry);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-rose);
        }
        .order-summary {
            background: var(--soft-white);
            border: 1px solid var(--lace-border);
            border-radius: 12px;
            padding: 25px;
            height: fit-content;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--lace-border);
        }
        .summary-row.total {
            border-bottom: none;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent-rose);
        }
        .submit-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>Reyn Gwyneth’s Make Up Store</h1>
            <span>Dainty & Delightful Cosmetics</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="team.html">Our Team</a>
        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Complete Your Order</h2>
        
        <div class="checkout-container">
            <!-- Checkout Form -->
            <div class="form-section">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" name="name" placeholder="Reyn Gwyneth" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="reyn@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="0917XXXXXXX" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Shipping Address</label>
                        <input type="text" id="address" name="address" placeholder="House/Unit No., Street Name, Barangay, City" required>
                    </div>

                    <div class="form-group">
                        <label for="payment">Payment Method</label>
                        <select id="payment" name="payment" required>
                            <option value="" disabled selected>Select payment method</option>
                            <option value="cod">Cash on Delivery (COD)</option>
                            <option value="gcash">GCash</option>
                            <option value="maya">Maya</option>
                            <option value="card">Credit / Debit Card</option>
                        </select>
                    </div>

                    <button type="submit" class="btn submit-btn">Place Order 🎀</button>
                </form>
            </div>

            <!-- Side Summary Display -->
            <div class="order-summary">
                <h3>Your Cart Items</h3>
                <br>
                <div class="summary-row">
                    <span>Coquette Rosewood Palette</span>
                    <span>₱1,200.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping Fee</span>
                    <span>₱100.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total Amount</span>
                    <span>₱1,300.00</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Reyn Gwyneth’s Make Up Store. Crafted with 🎀 for beauty dreamers.</p>
    </footer>
</body>
</html>
